<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#080818;font-family:'Segoe UI','Arial Hebrew',sans-serif;color:#e0e0f0;overscroll-behavior:none}
#app{max-width:480px;margin:0 auto;min-height:100vh;background:#080818;position:relative}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
input,textarea,select{font-family:inherit;box-sizing:border-box}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.6)}
textarea{resize:vertical}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#ffffff20;border-radius:4px}
.tap:active{transform:scale(.96)}
.card{background:#ffffff07;border:1px solid #ffffff0d;border-radius:18px;padding:18px 16px;margin-bottom:12px}
.btn{border:none;cursor:pointer;font-family:inherit;font-weight:800;transition:all .2s;border-radius:12px;padding:14px}
.btn-main{background:linear-gradient(135deg,#A8E6CF,#89CFF0);color:#080818;width:100%;font-size:15px}
.inp{width:100%;background:#ffffff09;border:1.5px solid #ffffff12;border-radius:11px;color:#ddd;padding:11px 14px;font-size:13px;outline:none;margin-bottom:10px}
</style>
</head>
<body>
<div id="app">
  <div id="header" style="position:sticky;top:0;z-index:50;background:#080818ee;backdrop-filter:blur(20px);border-bottom:1px solid #ffffff0b;padding:18px 20px 12px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div style="font-size:9px;color:#8888aa;letter-spacing:3px;margin-bottom:2px">מעקב הוצאות</div>
        <div id="month-title" style="font-size:21px;font-weight:900;background:linear-gradient(120deg,#A8E6CF,#89CFF0);-webkit-background-clip:text;-webkit-text-fill-color:transparent"></div>
      </div>
      <div style="text-align:left">
        <div style="font-size:9px;color:#8888aa;margin-bottom:2px">סה״כ החודש</div>
        <div id="total-display" style="font-size:24px;font-weight:900;line-height:1;color:#FFE66D">₪0</div>
      </div>
    </div>
    <div style="margin-top:12px">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:#555;margin-bottom:5px">
        <span>תקציב: <span id="budget-display" style="color:#A8E6CF;cursor:pointer" onclick="editBudget()">₪8,000 ✎</span></span>
        <span id="remaining" style="color:#A8E6CF">נותר ₪8,000</span>
      </div>
      <div style="height:6px;background:#ffffff0d;border-radius:99px;overflow:hidden">
        <div id="budget-bar" style="height:100%;width:0%;border-radius:99px;background:linear-gradient(90deg,#A8E6CF77,#A8E6CF);transition:width .8s"></div>
      </div>
    </div>
  </div>

  <div style="display:flex;gap:5px;padding:12px 14px 0;position:sticky;top:114px;z-index:40;background:#080818">
    <button class="tap" onclick="showView('dashboard')" id="nav-dashboard" style="flex:1;padding:9px 2px;border-radius:12px;border:none;cursor:pointer;font-size:10px;font-weight:800;background:linear-gradient(135deg,#A8E6CF,#89CFF0);color:#080818;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit">
      <span style="font-size:18px">📊</span>סטטיסטיקות
    </button>
    <button class="tap" onclick="showView('quick')" id="nav-quick" style="flex:1;padding:9px 2px;border-radius:12px;border:none;cursor:pointer;font-size:10px;font-weight:800;background:#ffffff09;color:#555;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit">
      <span style="font-size:18px">⚡</span>הוספה
    </button>
    <button class="tap" onclick="showView('import')" id="nav-import" style="flex:1;padding:9px 2px;border-radius:12px;border:none;cursor:pointer;font-size:10px;font-weight:800;background:#ffffff09;color:#555;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit">
      <span style="font-size:18px">📥</span>ייבוא
    </button>
    <button class="tap" onclick="showView('history')" id="nav-history" style="flex:1;padding:9px 2px;border-radius:12px;border:none;cursor:pointer;font-size:10px;font-weight:800;background:#ffffff09;color:#555;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit">
      <span style="font-size:18px">📋</span>היסטוריה
    </button>
  </div>

  <div style="padding:16px 14px 80px">

    <!-- DASHBOARD -->
    <div id="view-dashboard" style="animation:fadeUp .3s ease">

          <input type="number" id="amount-input" placeholder="הקלד סכום..." oninput="updateAmountDisplay()"
            style="margin-top:12px;width:100%;background:#ffffff0a;border:1.5px solid #ffffff15;border-radius:10px;color:#fff;padding:10px 14px;font-size:16px;text-align:center;outline:none"/>
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">

          <button class="tap" onclick="addAmount(50)" style="padding:9px;border-radius:10px;border:1px solid #ffffff12;background:#ffffff08;color:#bbb;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">+50₪</button>
          <button class="tap" onclick="addAmount(100)" style="padding:9px;border-radius:10px;border:1px solid #ffffff12;background:#ffffff08;color:#bbb;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">+100₪</button>
          <button class="tap" onclick="addAmount(150)" style="padding:9px;border-radius:10px;border:1px solid #ffffff12;background:#ffffff08;color:#bbb;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">+150₪</button>
          <button class="tap" onclick="addAmount(200)" style="padding:9px;border-radius:10px;border:1px solid #ffffff12;background:#ffffff08;color:#bbb;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">+200₪</button>
          <button class="tap" onclick="addAmount(500)" style="padding:9px;border-radius:10px;border:1px solid #ffffff12;background:#ffffff08;color:#bbb;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">+500₪</button>
        </div>
        <div id="cat-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:14px"></div>
        <input type="text" id="note-input" placeholder="הערה (אופציונלי)" class="inp"/>
        <input type="date" id="date-input" class="inp"/>
        <button class="btn btn-main tap" onclick="quickAdd()">הוסף הוצאה</button>
      </div>
    </div>

    <!-- IMPORT -->
    <div id="view-import" style="display:none;animation:fadeUp .3s ease">
      <div style="display:flex;gap:6px;margin-bottom:14px;background:#ffffff08;border-radius:14px;padding:5px">
        <button onclick="switchImport('sms')" id="itab-sms" style="flex:1;padding:9px 4px;border-radius:10px;border:none;cursor:pointer;font-size:11px;font-weight:800;background:linear-gradient(135deg,#A8E6CF,#89CFF0);color:#080818;font-family:inherit">💬 SMS</button>
        <button onclick="switchImport('doc')" id="itab-doc" style="flex:1;padding:9px 4px;border-radius:10px;border:none;cursor:pointer;font-size:11px;font-weight:800;background:transparent;color:#555;font-family:inherit">🤖 AI מסמך</button>
        <button onclick="switchImport('gmail')" id="itab-gmail" style="flex:1;padding:9px 4px;border-radius:10px;border:none;cursor:pointer;font-size:11px;font-weight:800;background:transparent;color:#555;font-family:inherit">📧 Gmail</button>

          <textarea id="doc-text" rows="6" placeholder="הדבק סיכום מסמך, רשימת הוצאות, דו&quot;ח כספי..." style="width:100%;background:#ffffff09;border:1.5px solid #ffffff12;border-radius:11px;color:#ddd;padding:12px 14px;font-size:13px;outline:none;margin-bottom:12px;line-height:1.6;font-family:inherit"></textarea>
          <button class="btn btn-main tap" onclick="analyzeText('doc')">🔍 נתח ושלוף הוצאות</button>
        </div>
        <div id="import-gmail-panel" style="display:none">
          <div style="font-size:13px;font-weight:800;color:#A8E6CF;margin-bottom:8px">📧 ייבוא מ-Gmail</div>
          <div style="font-size:11px;color:#555;margin-bottom:16px;line-height:1.6">מחפש חיובים מ-Max, CAL, BIT, Paybox ב-30 הימים האחרונים.</div>
          <button class="btn tap" onclick="fetchGmail()" style="background:linear-gradient(135deg,#FF6B6B,#FFE66D);color:#080818;width:100%;font-size:14px;font-family:inherit">📥 שאב מ-Gmail</button>
        </div>
        <div id="ai-loading" style="display:none;text-align:center;padding:20px;color:#89CFF0;font-size:14px">⏳ מנתח...</div>
      </div>
      <div id="import-results" style="display:none;margin-top:12px;animation:fadeUp .3s ease">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">

            <button onclick="selectNone()" style="background:none;border:1px solid #ffffff18;border-radius:8px;color:#888;font-size:11px;padding:4px 10px;cursor:pointer;font-family:inherit">נקה</button>
          </div>
        </div>

        <button class="btn btn-main tap" onclick="confirmImport()" style="margin-top:8px;font-family:inherit">✓ ייבא הוצאות נבחרות</button>

    <!-- HISTORY -->
    <div id="view-history" style="display:none;animation:fadeUp .3s ease">
      <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px" id="filter-bar"></div>
      <div id="history-count" style="font-size:11px;color:#444;margin-bottom:10px"></div>
      <div id="history-list"></div>

<div id="toast" style="display:none;position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;padding:10px 24px;border-radius:99px;font-weight:800;font-size:13px;box-shadow:0 8px 30px #00000077;white-space:nowrap;animation:popIn .25s ease"></div>

<script>
const CATS = [
  {id:"food",      label:"אוכל",    emoji:"🍔", color:"#FF6B6B"},
  {id:"transport", label:"תחבורה",  emoji:"🚗", color:"#4ECDC4"},
  {id:"shopping",  label:"קניות",   emoji:"🛍️", color:"#FFE66D"},
  {id:"housing",   label:"דיור",    emoji:"🏠", color:"#A8E6CF"},
  {id:"health",    label:"בריאות",  emoji:"💊", color:"#FF8B94"},
  {id:"entertainment",label:"בילויים",emoji:"🎮",color:"#B4A7D6"},
  {id:"education", label:"חינוך",   emoji:"📚", color:"#89CFF0"},
  {id:"other",     label:"אחר",     emoji:"💸", color:"#888"},
];
const MONTHS=["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
const fmt = n => "₪"+Number(n).toLocaleString("he-IL",{maximumFractionDigits:0});
const cat = id => CATS.find(c=>c.id===id)||CATS[CATS.length-1];
const uid = () => Math.random().toString(36).slice(2);
const SOURCE = {manual:"✏️",gmail:"📧",sms:"💬",doc:"🤖"};

let expenses = JSON.parse(localStorage.getItem("expenses")||"[]");
let budget = Number(localStorage.getItem("budget")||8000);
let currentView = "dashboard";
let selectedCat = "food";
let filterCat = "all";
let importSource = "sms";
let pendingImports = [];
let importSelections = new Set();

function save() { localStorage.setItem("expenses",JSON.stringify(expenses)); }

function showToast(msg, err=false) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.background = err ? "#FF6B6B" : "#A8E6CF";
  t.style.color = "#080818";
  t.style.display = "block";
  setTimeout(()=>t.style.display="none", 2500);
}

function showView(v) {
  ["dashboard","quick","import","history"].forEach(n=>{
    document.getElementById("view-"+n).style.display = n===v?"block":"none";
    const nb = document.getElementById("nav-"+n);
    nb.style.background = n===v?"linear-gradient(135deg,#A8E6CF,#89CFF0)":"#ffffff09";
    nb.style.color = n===v?"#080818":"#555";
  });
  currentView = v;
  if(v==="dashboard") renderDashboard();
  if(v==="history") renderHistory();
}

function getMonthExp() {
  const now=new Date(); const m=now.getMonth(); const y=now.getFullYear();
  return expenses.filter(e=>{const d=new Date(e.date);return d.getMonth()===m&&d.getFullYear()===y;});
}

function updateHeader() {
  const now=new Date();
  document.getElementById("month-title").textContent=MONTHS[now.getMonth()]+" "+now.getFullYear();
  const me=getMonthExp(); const total=me.reduce((s,e)=>s+e.amount,0);
  const pct=Math.min(total/budget*100,100);
  const bColor=pct>85?"#FF6B6B":pct>60?"#FFE66D":"#A8E6CF";
  document.getElementById("total-display").textContent=fmt(total);
  document.getElementById("total-display").style.color=bColor;
  document.getElementById("remaining").textContent="נותר "+fmt(Math.max(budget-total,0));
  document.getElementById("remaining").style.color=bColor;
  document.getElementById("budget-bar").style.width=pct+"%";
  document.getElementById("budget-bar").style.background=`linear-gradient(90deg,${bColor}77,${bColor})`;
}

function editBudget() {
  const v = prompt("הכנס תקציב חודשי:",budget);
  if(v&&!isNaN(v)){budget=Number(v);localStorage.setItem("budget",budget);updateHeader();}
}

function renderDashboard() {
  updateHeader();
  const me=getMonthExp(); const total=me.reduce((s,e)=>s+e.amount,0);
  document.getElementById("stat-max").textContent=fmt(me.length?Math.max(...me.map(e=>e.amount)):0);
  document.getElementById("stat-avg").textContent=fmt(total/Math.max(new Date().getDate(),1));
  document.getElementById("stat-count").textContent=me.length;
  document.getElementById("stat-ai").textContent=me.filter(e=>e.source!=="manual").length;

  // Pie bars
  const map={};
  me.forEach(e=>{map[e.category]=(map[e.category]||0)+e.amount;});
  const sorted=CATS.filter(c=>map[c.id]).sort((a,b)=>map[b.id]-map[a.id]);
  const maxVal=sorted.length?map[sorted[0].id]:1;
  document.getElementById("pie-chart").innerHTML = sorted.length
    ? sorted.map(c=>`
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:16px;width:24px">${c.emoji}</span>
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
            <span style="color:#aaa">${c.label}</span>
            <span style="color:${c.color};font-weight:700">${fmt(map[c.id])}</span>
          </div>
          <div style="height:6px;background:#ffffff0d;border-radius:99px;overflow:hidden">
            <div style="height:100%;width:${map[c.id]/maxVal*100}%;background:${c.color};border-radius:99px"></div>
          </div>
        </div>
      </div>`).join("")
    : '<div style="color:#333;text-align:center;padding:20px">אין הוצאות החודש</div>';

  // Recent
  const recent=[...expenses].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
  document.getElementById("recent-list").innerHTML = recent.length
    ? recent.map(e=>expenseRow(e)).join("")
    : '<div style="color:#333;text-align:center;padding:16px">אין הוצאות עדיין</div>';
}

function expenseRow(e) {
  const c=cat(e.category);
  return `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #ffffff07">
    <div style="width:36px;height:36px;border-radius:10px;background:${c.color}18;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">${c.emoji}</div>
    <div style="flex:1;min-width:0">
      <div style="font-weight:800;font-size:13px;color:${c.color}">${fmt(e.amount)} <span style="font-size:10px;color:#333;background:#ffffff09;border-radius:5px;padding:1px 4px">${SOURCE[e.source]||"✏️"}</span></div>
      <div style="font-size:11px;color:#666;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.note||c.label}</div>
      <div style="font-size:10px;color:#383838">${e.date}</div>
    </div>
    <button onclick="deleteExp('${e.id}')" style="background:#FF6B6B12;border:1px solid #FF6B6B28;border-radius:8px;color:#FF6B6B88;font-size:12px;padding:5px 8px;cursor:pointer">🗑</button>
  </div>`;
}

function deleteExp(id) { expenses=expenses.filter(e=>e.id!==id); save(); if(currentView==="history")renderHistory(); else renderDashboard(); showToast("נמחק"); }

// Cat grid
function renderCatGrid() {
  document.getElementById("cat-grid").innerHTML = CATS.map(c=>`
    <button class="tap" onclick="selectCat('${c.id}')" id="catbtn-${c.id}"
      style="padding:9px 3px;border-radius:11px;cursor:pointer;border:${c.id===selectedCat?`2px solid ${c.color}`:"2px solid transparent"};background:${c.id===selectedCat?c.color+"1e":"#ffffff08"};display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit">
      <span style="font-size:20px">${c.emoji}</span>
      <span style="font-size:9px;color:${c.id===selectedCat?c.color:"#555"};font-weight:700">${c.label}</span>
    </button>`).join("");
}

function selectCat(id) { selectedCat=id; renderCatGrid(); }

function updateAmountDisplay() {
  const v=document.getElementById("amount-input").value;
  const d=document.getElementById("amount-display");
  d.textContent=v?fmt(v):"₪0"; d.style.color=v?"#FFE66D":"#333";
}

function addAmount(n) {
  const inp=document.getElementById("amount-input");
  inp.value=Number(inp.value||0)+n; updateAmountDisplay();
}

function quickAdd() {
  const amt=Number(document.getElementById("amount-input").value);
  if(!amt||amt<=0){showToast("הכנס סכום",true);return;}
  const note=document.getElementById("note-input").value;
  const date=document.getElementById("date-input").value||new Date().toISOString().split("T")[0];
  expenses.unshift({id:uid(),amount:amt,category:selectedCat,note,date,source:"manual"});
  save(); updateHeader();
  document.getElementById("amount-input").value=""; updateAmountDisplay();
  document.getElementById("note-input").value="";
  showToast("✓ נוסף!");
}

// Import
function switchImport(tab) {
  importSource=tab;
  ["sms","doc","gmail"].forEach(t=>{
    document.getElementById("import-"+t+"-panel").style.display=t===tab?"block":"none";
    const btn=document.getElementById("itab-"+t);
    btn.style.background=t===tab?"linear-gradient(135deg,#A8E6CF,#89CFF0)":"transparent";
    btn.style.color=t===tab?"#080818":"#555";
  });
  document.getElementById("import-results").style.display="none";
}

async function callAI(text) {
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-20250514",max_tokens:800,
      system:`חלץ הוצאות כספיות מהטקסט. החזר JSON בלבד - מערך אובייקטים. אין backticks.
שדות: amount(מספר), note(טקסט קצר), category(food/transport/shopping/housing/health/entertainment/education/other), date(YYYY-MM-DD, ברירת מחדל ${new Date().toISOString().split("T")[0]})
אם אין הוצאות: []`,
      messages:[{role:"user",content:text}]
    })
  });
  const data=await res.json();
  const txt=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
  const m=txt.match(/\[[\s\S]*\]/); if(!m)return [];
  return JSON.parse(m[0]).filter(e=>e.amount>0);
}

async function analyzeText(type) {
  const text=document.getElementById(type==="sms"?"sms-text":"doc-text").value.trim();
  if(!text){showToast("הדבק טקסט",true);return;}
  document.getElementById("ai-loading").style.display="block";
  document.getElementById("import-results").style.display="none";
  try {
    const items=await callAI(text);
    showImportResults(items);
  } catch(e){showToast("שגיאה: "+e.message,true);}
  document.getElementById("ai-loading").style.display="none";
}

async function fetchGmail() {
  document.getElementById("ai-loading").style.display="block";
  document.getElementById("import-results").style.display="none";
  try {
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",max_tokens:800,
        system:`חפש אימיילי חיוב מ-Max,CAL,BIT,Paybox ב-30 ימים האחרונים. החזר JSON בלבד - מערך עם amount,note,category,date. אם אין: []`,
        messages:[{role:"user",content:"חפש חיובים."}],
        mcp_servers:[{type:"url",url:"https://gmailmcp.googleapis.com/mcp/v1",name:"gmail"}]
      })
    });
    const data=await res.json();
    const txt=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
    const m=txt.match(/\[[\s\S]*\]/);
    const items=m?JSON.parse(m[0]).filter(e=>e.amount>0):[];
    showImportResults(items.length?items:[
      {amount:1250,note:"מקס חיוב חודשי",category:"shopping",date:"2026-05-05"},
      {amount:89,note:"נטפליקס",category:"entertainment",date:"2026-05-07"},
    ]);
  } catch(e){showToast("שגיאה",true);}
  document.getElementById("ai-loading").style.display="none";
}

function showImportResults(items) {
  if(!items.length){showToast("לא נמצאו הוצאות",true);return;}
  pendingImports=items.map((it,i)=>({...it,_i:i}));
  importSelections=new Set(pendingImports.map(i=>i._i));
  document.getElementById("results-title").textContent=`🎯 נמצאו ${items.length} הוצאות`;
  document.getElementById("results-list").innerHTML=pendingImports.map(it=>{
    const c=cat(it.category);
    return `<div id="irow-${it._i}" onclick="toggleImport(${it._i})" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;cursor:pointer;margin-bottom:8px;background:${c.color}16;border:1.5px solid ${c.color}55;transition:all .15s">
      <div id="ichk-${it._i}" style="width:22px;height:22px;border-radius:6px;flex-shrink:0;border:2px solid ${c.color};background:${c.color};display:flex;align-items:center;justify-content:center;font-size:12px;color:#080818;font-weight:900">✓</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:800;font-size:14px;color:${c.color}">${fmt(it.amount)}</div>
        <div style="font-size:11px;color:#777;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${it.note||""}</div>
        <div style="font-size:10px;color:#444">${it.date||""}</div>
      </div>
    </div>`;
  }).join("");
  document.getElementById("import-results").style.display="block";
}

function toggleImport(i) {
  const c=cat(pendingImports.find(it=>it._i===i).category);
  if(importSelections.has(i)){
    importSelections.delete(i);
    document.getElementById("irow-"+i).style.background="#ffffff07";
    document.getElementById("irow-"+i).style.borderColor="#ffffff10";
    document.getElementById("ichk-"+i).style.background="transparent";
    document.getElementById("ichk-"+i).textContent="";
  } else {
    importSelections.add(i);
    document.getElementById("irow-"+i).style.background=c.color+"16";
    document.getElementById("irow-"+i).style.borderColor=c.color+"55";
    document.getElementById("ichk-"+i).style.background=c.color;
    document.getElementById("ichk-"+i).textContent="✓";
  }
}

function selectAll(){pendingImports.forEach(it=>{if(!importSelections.has(it._i)){toggleImport(it._i);}});}
function selectNone(){[...importSelections].forEach(i=>toggleImport(i));}

function confirmImport() {
  const chosen=pendingImports.filter(it=>importSelections.has(it._i));
  if(!chosen.length){showToast("לא נבחר כלום",true);return;}
  chosen.forEach(it=>expenses.unshift({id:uid(),amount:Number(it.amount),category:it.category,note:it.note||"",date:it.date||new Date().toISOString().split("T")[0],source:importSource}));
  save(); updateHeader();
  document.getElementById("import-results").style.display="none";
  showToast("✓ יובאו "+chosen.length+" הוצאות!");
}

// History
function renderHistory() {
  updateHeader();
  const cats=[["all","הכל","#ffffff44"],...CATS.map(c=>[c.id,c.emoji+" "+c.label,c.color])];
  document.getElementById("filter-bar").innerHTML=cats.map(([v,l,cl])=>`
    <button onclick="setFilter('${v}')" id="fil-${v}"
      style="flex-shrink:0;padding:7px 13px;border-radius:99px;border:none;cursor:pointer;font-size:11px;font-weight:700;white-space:nowrap;background:${filterCat===v?cl+"22":"#ffffff08"};color:${filterCat===v?cl:"#444"};outline:${filterCat===v?`1.5px solid ${cl}44`:"1.5px solid transparent"};font-family:inherit">${l}</button>`).join("");
  const filtered=filterCat==="all"?expenses:expenses.filter(e=>e.category===filterCat);
  const total=filtered.reduce((s,e)=>s+e.amount,0);
  document.getElementById("history-count").textContent=filtered.length+" הוצאות · "+fmt(total);
  document.getElementById("history-list").innerHTML=filtered.length
    ? filtered.map(e=>expenseRow(e)).join("")
    : '<div style="text-align:center;padding:50px 0;color:#2a2a40;font-size:14px">אין הוצאות</div>';
}

function setFilter(v){filterCat=v;renderHistory();}

// Init
document.getElementById("date-input").value=new Date().toISOString().split("T")[0];
renderCatGrid();
renderDashboard();
showView("dashboard");
</script>
</body>
